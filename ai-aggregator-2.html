 <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>PolyMind – KI Aggregator 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent-claude: #e8773a;
    --accent-gpt: #19c37d;
    --accent-gemini: #4285f4;
    --text: #f0f0f5;
    --text-muted: #6b6b80;
    --text-dim: #9090a5;
    --glow-claude: rgba(232,119,58,0.15);
    --glow-gpt: rgba(25,195,125,0.15);
    --glow-gemini: rgba(66,133,244,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #e8773a, #a855f7, #4285f4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .settings-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
  .settings-btn:hover { border-color: var(--accent-claude); color: var(--accent-claude); }

  .prompt-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }
  textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 0.88rem; padding: 16px; resize: none; min-height: 120px; }
  .prompt-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 1px solid var(--border); }
  .pill { font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; border: 1px solid; cursor: pointer; opacity: 1; transition: 0.2s; }
  .pill.disabled { opacity: 0.2; filter: grayscale(1); }
  .pill.claude { border-color: var(--accent-claude); color: var(--accent-claude); }
  .pill.gpt { border-color: var(--accent-gpt); color: var(--accent-gpt); }
  .pill.gemini { border-color: var(--accent-gemini); color: var(--accent-gemini); }

  .send-btn { background: linear-gradient(135deg, #e8773a, #c45a1f); border: none; color: white; padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .send-btn:disabled { opacity: 0.4; }

  .results-section { display: none; margin-top: 30px; }
  .results-section.visible { display: block; }
  .responses-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
  @media(min-width: 600px) { .responses-grid { grid-template-columns: repeat(3, 1fr); } }

  .response-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; min-height: 150px; transition: 0.3s; }
  .response-card.claude { border-top: 3px solid var(--accent-claude); }
  .response-card.gpt { border-top: 3px solid var(--accent-gpt); }
  .response-card.gemini { border-top: 3px solid var(--accent-gemini); }
  .card-header { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .card-body { font-size: 0.8rem; line-height: 1.5; color: var(--text-dim); white-space: pre-wrap; max-height: 300px; overflow-y: auto; }

  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-top: 20px; padding: 20px; border-left: 4px solid var(--accent-claude); }
  .error-text { color: #ff6b6b; font-size: 0.75rem; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); padding: 25px; border-radius: 16px; width: 90%; max-width: 450px; border: 1px solid var(--border); }
  .field-group { margin-bottom: 15px; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 10px; color: white; border-radius: 8px; margin-top: 5px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">PolyMind <span>Aggregator v4</span></div>
    <button class="settings-btn" onclick="toggleModal(true)">⚙ API Keys</button>
  </header>

  <div class="prompt-box">
    <textarea id="promptInput" placeholder="Stell deine Frage an alle KIs..."></textarea>
    <div class="prompt-footer">
      <div style="display:flex; gap:8px;">
        <div class="pill claude" id="pill-claude" onclick="toggleModel('claude')">Claude 4</div>
        <div class="pill gpt" id="pill-gpt" onclick="toggleModel('gpt')">GPT-4o</div>
        <div class="pill gemini" id="pill-gemini" onclick="toggleModel('gemini')">Gemini 2</div>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendPrompt()">▶ Senden</button>
    </div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="responses-grid" id="responsesGrid"></div>
    <div class="summary-card" id="summaryCard" style="display:none;">
      <h4 style="color:var(--accent-claude); margin-bottom:10px;">Zusammenfassung & Analyse</h4>
      <div id="summaryBody" style="font-size: 0.85rem; line-height: 1.6;"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>API Einstellungen</h3>
    <div class="field-group">
      <label>Anthropic Key</label>
      <input id="key-claude" type="password" placeholder="sk-ant-...">
    </div>
    <div class="field-group">
      <label>OpenAI Key</label>
      <input id="key-gpt" type="password" placeholder="sk-...">
    </div>
    <div class="field-group">
      <label>Google Key</label>
      <input id="key-gemini" type="password" placeholder="AIza...">
    </div>
    <button class="send-btn" style="width:100%" onclick="saveKeys()">Speichern</button>
  </div>
</div>

<script>
  let keys = JSON.parse(localStorage.getItem('polymind_keys') || '{"claude":"","gpt":"","gemini":""}');
  let activeModels = { claude: true, gpt: true, gemini: true };

  function toggleModal(show) { document.getElementById('settingsModal').classList.toggle('open', show); }
  function saveKeys() {
    keys.claude = document.getElementById('key-claude').value.trim();
    keys.gpt = document.getElementById('key-gpt').value.trim();
    keys.gemini = document.getElementById('key-gemini').value.trim();
    localStorage.setItem('polymind_keys', JSON.stringify(keys));
    toggleModal(false);
  }

  function toggleModel(m) {
    activeModels[m] = !activeModels[m];
    document.getElementById('pill-' + m).classList.toggle('disabled', !activeModels[m]);
  }

  async function callClaude(prompt, key) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20240620', // Nutze stabilen 2024/25 Namen
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error('Status ' + res.status);
    const data = await res.json();
    return data.content[0].text;
  }

  async function callGPT(prompt, key) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) throw new Error('Status ' + res.status);
    const data = await res.json();
    return data.choices[0].message.content;
  }

  async function callGemini(prompt, key) {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    if (!res.ok) throw new Error('Status ' + res.status);
    const data = await res.json();
    return data.candidates[0].content.parts[0].text;
  }

  async function sendPrompt() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return;

    const grid = document.getElementById('responsesGrid');
    const section = document.getElementById('resultsSection');
    grid.innerHTML = '';
    section.classList.add('visible');

    const tasks = [];
    const models = ['claude', 'gpt', 'gemini'];

    models.forEach(m => {
      if (!activeModels[m] || !keys[m]) return;
      
      const card = document.createElement('div');
      card.className = `response-card ${m}`;
      card.innerHTML = `<div class="card-header">${m.toUpperCase()}</div><div class="card-body" id="res-${m}">Lade...</div>`;
      grid.appendChild(card);

      const fn = m === 'claude' ? callClaude : m === 'gpt' ? callGPT : callGemini;
      tasks.push(fn(prompt, keys[m]).then(text => {
        document.getElementById(`res-${m}`).textContent = text;
        return { model: m, text };
      }).catch(err => {
        document.getElementById(`res-${m}`).innerHTML = `<span class="error-text">API Fehler: ${err.message}</span>`;
        return null;
      }));
    });

    const results = (await Promise.all(tasks)).filter(r => r !== null);
    
    // Einfache Zusammenfassung simulieren (oder echten Claude-Call für Analyse nutzen)
    if (results.length > 0) {
        document.getElementById('summaryCard').style.display = 'block';
        document.getElementById('summaryBody').textContent = "Analysiere Antworten...";
        // Hier könnte ein weiterer Call an Claude für die echte Analyse folgen.
    }
  }
</script>
</body>
</html>
